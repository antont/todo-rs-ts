name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright-local:
    runs-on: ubuntu-latest
    env:
      CORS_ORIGIN: http://localhost:5173
      VITE_API_BASE: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build API server
        run: cargo build --no-default-features --features sqlite,test-helpers --bin todo-api

      - name: Install npm dependencies
        run: npm ci --prefix web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --prefix web playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx --prefix web playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run --prefix web test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-local
          path: e2e/playwright-report/
          retention-days: 7
